name: Sync uv Python Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "43 */6 * * *"

concurrency:
  group: sync-uv-python-assets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      RCLONE_CONFIG_MIRROR_TYPE: s3
      RCLONE_CONFIG_MIRROR_PROVIDER: Other
      RCLONE_CONFIG_MIRROR_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      RCLONE_CONFIG_MIRROR_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_MIRROR_ENDPOINT: ${{ secrets.AWS_ENDPOINT_URL }}
      RCLONE_CONFIG_MIRROR_REGION: ${{ secrets.AWS_REGION }}
      RCLONE_CONFIG_MIRROR_FORCE_PATH_STYLE: "true"
      RCLONE_TRANSFERS: "1"
      RCLONE_CHECKERS: "1"
      RCLONE_S3_UPLOAD_CONCURRENCY: "1"
      RCLONE_S3_CHUNK_SIZE: "128Mi"
      RCLONE_RETRIES: "20"
      RCLONE_LOW_LEVEL_RETRIES: "20"
      RCLONE_RETRIES_SLEEP: "10s"
      RCLONE_TPSLIMIT: "0.5"
      RCLONE_TPSLIMIT_BURST: "1"
      RCLONE_STATS: "20s"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rclone
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rclone

      - name: Validate mirror configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}"
          : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
          : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
          : "${AWS_ENDPOINT_URL:?AWS_ENDPOINT_URL is required}"
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${S3_BUCKET:?S3_BUCKET is required}"

      - name: Build rewritten python metadata and stage assets
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="$RUNNER_TEMP/python-stage"
          mkdir -p "$stage_dir/metadata"

          curl -LsSf \
            https://raw.githubusercontent.com/astral-sh/uv/main/crates/uv-python/download-metadata.json \
            -o "$stage_dir/upstream-download-metadata.json"

          python3 -m scripts.mirrorctl build-python-downloads \
            --input "$stage_dir/upstream-download-metadata.json" \
            --output "$stage_dir/metadata/python-downloads.json" \
            --manifest-output "$stage_dir/python-assets.json" \
            --public-base-url "$PUBLIC_BASE_URL"

          python3 - "$stage_dir/python-assets.json" "$stage_dir" <<'PY'
          import hashlib
          import json
          import pathlib
          import sys
          import urllib.request

          manifest_path = pathlib.Path(sys.argv[1])
          stage_dir = pathlib.Path(sys.argv[2])
          assets = json.loads(manifest_path.read_text(encoding="utf-8"))

          for asset in assets:
              destination = stage_dir / asset["mirror_path"]
              destination.parent.mkdir(parents=True, exist_ok=True)
              urllib.request.urlretrieve(asset["source_url"], destination)
              expected_sha256 = asset.get("sha256")
              if expected_sha256:
                  digest = hashlib.sha256(destination.read_bytes()).hexdigest()
                  if digest != expected_sha256:
                      raise SystemExit(
                          f"sha256 mismatch for {asset['source_url']}: {digest} != {expected_sha256}"
                      )
          PY

          if [ -d "$stage_dir/python-build-standalone" ]; then
            RCLONE_CACHE_CONTROL="public, max-age=31536000, immutable" \
            bash scripts/rclone_s3_mirror.sh sync-dir \
              "$stage_dir/python-build-standalone/" \
              "python-build-standalone/"
          fi

          if [ -d "$stage_dir/pypy" ]; then
            RCLONE_CACHE_CONTROL="public, max-age=31536000, immutable" \
            bash scripts/rclone_s3_mirror.sh sync-dir \
              "$stage_dir/pypy/" \
              "pypy/"
          fi

          if [ -d "$stage_dir/graalpython" ]; then
            RCLONE_CACHE_CONTROL="public, max-age=31536000, immutable" \
            bash scripts/rclone_s3_mirror.sh sync-dir \
              "$stage_dir/graalpython/" \
              "graalpython/"
          fi

          RCLONE_CACHE_CONTROL="public, max-age=300" \
          bash scripts/rclone_s3_mirror.sh copy-file \
            "$stage_dir/metadata/python-downloads.json" \
            "metadata/python-downloads.json"
