name: Sync uv Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: sync-uv-assets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      MIRROR_KEY_PREFIX: ${{ vars.MIRROR_KEY_PREFIX }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      MIRROR_ENABLE_MULTIPART: "true"
      MIRROR_MULTIPART_THRESHOLD_BYTES: "268435456"
      MIRROR_PART_SIZE_BYTES: "134217728"
      MIRROR_MAX_ATTEMPTS: "24"
      MIRROR_BACKOFF_SECONDS: "5"
      MIRROR_MAX_BACKOFF_SECONDS: "60"
      MIRROR_REQUEST_INTERVAL_SECONDS: "2"
      MIRROR_CONNECT_TIMEOUT_SECONDS: "10"
      MIRROR_READ_TIMEOUT_SECONDS: "300"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install upload dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check boto3

      - name: Validate mirror configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}"
          : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
          : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
          : "${AWS_ENDPOINT_URL:?AWS_ENDPOINT_URL is required}"
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${S3_BUCKET:?S3_BUCKET is required}"

      - name: Mirror latest uv release
        shell: bash
        run: |
          set -euo pipefail

          key_prefix="${MIRROR_KEY_PREFIX#/}"
          key_prefix="${key_prefix%/}"
          with_prefix() {
            if [ -n "$key_prefix" ]; then
              printf '%s/%s' "$key_prefix" "$1"
            else
              printf '%s' "$1"
            fi
          }

          stage_dir="$RUNNER_TEMP/uv-stage"
          uv_tag="$(gh release view --repo astral-sh/uv --json tagName --jq '.tagName')"
          versioned_dir="$stage_dir/github/astral-sh/uv/releases/download/$uv_tag"
          latest_dir="$stage_dir/github/astral-sh/uv/releases/download/latest"

          mkdir -p "$versioned_dir" "$latest_dir" "$stage_dir/metadata"
          gh release download "$uv_tag" --repo astral-sh/uv --dir "$versioned_dir"

          cp "$versioned_dir/uv-installer.sh" "$latest_dir/uv-installer.sh"
          cp "$versioned_dir/uv-installer.ps1" "$latest_dir/uv-installer.ps1"

          python3 -m scripts.mirrorctl write-uv-latest \
            --output "$stage_dir/metadata/uv-latest.json" \
            --public-base-url "$PUBLIC_BASE_URL" \
            --tag "$uv_tag"

          python3 -m scripts.mirrorctl render-installers \
            --public-base-url "$PUBLIC_BASE_URL" \
            --default-index-url "${PUBLIC_BASE_URL%/}/pypi/simple" \
            --output-dir "$stage_dir"

          python3 -m scripts.mirrorctl sync-dir-with-state \
            --local-dir "$versioned_dir" \
            --prefix "$(with_prefix "github/astral-sh/uv/releases/download/$uv_tag")" \
            --state-key "$(with_prefix "state/github/astral-sh/uv/releases/download/$uv_tag.json")" \
            --cache-control "public, max-age=31536000, immutable"

          python3 -m scripts.mirrorctl upload-dir \
            --local-dir "$latest_dir" \
            --prefix "$(with_prefix "github/astral-sh/uv/releases/download/latest")" \
            --cache-control "public, max-age=300"

          python3 -m scripts.mirrorctl upload-file \
            --local-path "$stage_dir/metadata/uv-latest.json" \
            --key "$(with_prefix "metadata/uv-latest.json")" \
            --cache-control "public, max-age=300"

          python3 -m scripts.mirrorctl upload-file \
            --local-path "$stage_dir/install-cn.sh" \
            --key "$(with_prefix "install-cn.sh")" \
            --cache-control "public, max-age=300"

          python3 -m scripts.mirrorctl upload-file \
            --local-path "$stage_dir/install-cn.ps1" \
            --key "$(with_prefix "install-cn.ps1")" \
            --cache-control "public, max-age=300"

      - name: Deploy Cloudflare Worker with current S3 credentials
        shell: bash
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          set -euo pipefail
          : "${CLOUDFLARE_EMAIL:?CLOUDFLARE_EMAIL is required}"
          : "${CLOUDFLARE_API_KEY:?CLOUDFLARE_API_KEY is required}"

          cd cloudflare/uv-origin-proxy
          printf '%s' "$AWS_ACCESS_KEY_ID" | npx wrangler secret put S3_ACCESS_KEY_ID
          printf '%s' "$AWS_SECRET_ACCESS_KEY" | npx wrangler secret put S3_SECRET_ACCESS_KEY

          if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
            printf '%s' "$AWS_SESSION_TOKEN" | npx wrangler secret put S3_SESSION_TOKEN
          else
            npx wrangler secret delete S3_SESSION_TOKEN || true
          fi

          npx wrangler deploy
