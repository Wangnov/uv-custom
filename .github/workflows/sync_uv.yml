name: Sync uv Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: sync-uv-assets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      DEFAULT_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      RCLONE_CONFIG_MIRROR_TYPE: s3
      RCLONE_CONFIG_MIRROR_PROVIDER: Other
      RCLONE_CONFIG_MIRROR_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      RCLONE_CONFIG_MIRROR_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_MIRROR_ENDPOINT: ${{ secrets.AWS_ENDPOINT_URL }}
      RCLONE_CONFIG_MIRROR_REGION: ${{ secrets.AWS_REGION }}
      RCLONE_CONFIG_MIRROR_FORCE_PATH_STYLE: "true"
      RCLONE_TRANSFERS: "1"
      RCLONE_CHECKERS: "1"
      RCLONE_S3_UPLOAD_CONCURRENCY: "1"
      RCLONE_S3_CHUNK_SIZE: "128Mi"
      RCLONE_RETRIES: "20"
      RCLONE_LOW_LEVEL_RETRIES: "20"
      RCLONE_RETRIES_SLEEP: "10s"
      RCLONE_TPSLIMIT: "0.5"
      RCLONE_TPSLIMIT_BURST: "1"
      RCLONE_STATS: "20s"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rclone
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rclone

      - name: Validate mirror configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}"
          : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
          : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"
          : "${AWS_ENDPOINT_URL:?AWS_ENDPOINT_URL is required}"
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${S3_BUCKET:?S3_BUCKET is required}"

      - name: Mirror latest uv release
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="$RUNNER_TEMP/uv-stage"
          uv_tag="$(gh release view --repo astral-sh/uv --json tagName --jq '.tagName')"
          versioned_dir="$stage_dir/github/astral-sh/uv/releases/download/$uv_tag"
          latest_dir="$stage_dir/github/astral-sh/uv/releases/download/latest"

          mkdir -p "$versioned_dir" "$latest_dir" "$stage_dir/metadata"
          gh release download "$uv_tag" --repo astral-sh/uv --dir "$versioned_dir"

          cp "$versioned_dir/uv-installer.sh" "$latest_dir/uv-installer.sh"
          cp "$versioned_dir/uv-installer.ps1" "$latest_dir/uv-installer.ps1"

          python3 -m scripts.mirrorctl write-uv-latest \
            --output "$stage_dir/metadata/uv-latest.json" \
            --public-base-url "$PUBLIC_BASE_URL" \
            --tag "$uv_tag"

          python3 -m scripts.mirrorctl render-installers \
            --public-base-url "$PUBLIC_BASE_URL" \
            --default-index-url "$DEFAULT_INDEX_URL" \
            --output-dir "$stage_dir"

          RCLONE_CACHE_CONTROL="public, max-age=31536000, immutable" \
          bash scripts/rclone_s3_mirror.sh copy-dir \
            "$versioned_dir/" \
            "github/astral-sh/uv/releases/download/$uv_tag/"

          RCLONE_CACHE_CONTROL="public, max-age=300" \
          bash scripts/rclone_s3_mirror.sh sync-dir \
            "$latest_dir/" \
            "github/astral-sh/uv/releases/download/latest/"

          RCLONE_CACHE_CONTROL="public, max-age=300" \
          bash scripts/rclone_s3_mirror.sh copy-file \
            "$stage_dir/metadata/uv-latest.json" \
            "metadata/uv-latest.json"

          RCLONE_CACHE_CONTROL="public, max-age=300" \
          bash scripts/rclone_s3_mirror.sh copy-file \
            "$stage_dir/install-cn.sh" \
            "install-cn.sh"

          RCLONE_CACHE_CONTROL="public, max-age=300" \
          bash scripts/rclone_s3_mirror.sh copy-file \
            "$stage_dir/install-cn.ps1" \
            "install-cn.ps1"
